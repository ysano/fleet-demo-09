openapi: 3.0.3
info:
  title: Orders API
  version: "1.0.0"
servers:
  - url: https://api.example.internal/orders/v1
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed]
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  schemas:
    Order:
      type: object
      required: [id, item, quantity]
      properties:
        id:
          type: string
        item:
          type: string
        quantity:
          type: integer
    OrderCreate:
      type: object
      required: [item, quantity]
      properties:
        item:
          type: string
        quantity:
          type: integer
